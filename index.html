<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-app">

        <!-- Header -->
        <div class="header">
            <h1>Weather App</h1>
            <p class="location">📍 New York, USA</p>
            <p class="date">Sunday, May 24</p>
        </div>

        <!-- Current Weather -->
        <div class="current-weather">
            <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="Weather Icon">

            <h2>28°C</h2>
            <p>Sunny</p>

            <div class="details">
                <span>💧 Humidity: 60%</span>
                <span>🌬 Wind: 12 km/h</span>
            </div>
        </div>

        <!-- Forecast -->
        <div class="forecast">

            <div class="forecast-card">
                <h3>Mon</h3>
                <p>☀️</p>
                <p>30°C</p>
            </div>

            <div class="forecast-card">
                <h3>Tue</h3>
                <p>🌧</p>
                <p>25°C</p>
            </div>

            <div class="forecast-card">
                <h3>Wed</h3>
                <p>⛅</p>
                <p>27°C</p>
            </div>

            <div class="forecast-card">
                <h3>Thu</h3>
                <p>☁️</p>
                <p>26°C</p>
            </div>

            <div class="forecast-card">
                <h3>Fri</h3>
                <p>🌩</p>
                <p>24°C</p>
            </div>

        </div>

    </div>

</body>
</html>
